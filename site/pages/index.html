<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SI-logizm</title>
    <link rel="stylesheet/less" href="styles/main.less" />
    <script src="https://cdn.jsdelivr.net/npm/less"></script>
</head>
<body>
    <div class="center-wrap">
        <div class="container main">
            <h1>SI-logizm</h1>

            <div class="toggle-mode">
                <button class="mode-btn active" id="modeText">Tekst</button>
                <button class="mode-btn" id="modeFile">Plik</button>
            </div>

            <div class="field type-one">
                <label for="syll">Treść sylogizmu</label>
                <textarea id="syll" rows="4" placeholder="Wprowadź sylogizm…"></textarea>
            </div>

            <div class="field type-file hidden">
                <label for="templateFile">CSV</label>
                <a href="uploads/template.csv" downlad="uploads/template.csv" id="templateFile">Pobierz wzorowy plik csv</a>
            </div>

            <div class="field field-inline type-file hidden">
                <input type="text" id="syllFile" placeholder="Wgraj plik csv" readonly>
                <button id="syllUpload">Wgraj</button>
            </div>

            <div class="field">
                <label for="type">Typ rozważania</label>
                <select id="type">
                    <option value="0">Sprawdzanie poprawności logicznej</option>
                    <option value="1">Sprawdzenie poprawności logicznej (0/1)</option>
                    <option value="2">Stworzenie wniosku do przesłanek</option>
                    <option value="3">Sprawdzenie poprawności logicznej (z podaniem reguł)</option>
                    <option value="4">Prosty</option>
                    <option value="-1">Niestandardowe</option>
                </select>
            </div>

            <div class="field hidden">
                <label for="customSPrompt">Niestandarowy System Prompt</label>
                <textarea id="customSPrompt" rows="2" placeholder="Wprowadź system prompt..."></textarea>
            </div>

            <div class="field">
                <label for="model">Model</label>
                <select id="model">
                    <option value="qwen3_14b_q5km">Qwen3-14B-Q5_K_M (Local)</option>
                    <option value="llama-3.3-70b-versatile">Llama-3.3-70B-Versatile (Remote)</option>
                    <option value="openai/gpt-oss-20b">GPT-OSS-20B (Remote)</option>
                    <option value="openai/gpt-oss-120b">GPT_OSS-120B (Remote)</option> 
                    <option value="qwen/qwen3-32b">Qwen3-32B (Remote)</option>
                </select>
            </div>

            <div class="field hidden">
                <label for="reasonEffort">Poziom Reasoning</label>
                <select id="reasonEffort">
                    <option value="none">Brak</option>
                    <option value="low">Niski</option>
                    <option value="medium">Średni</option>
                    <option value="high">Wysoki</option>
                </select>
            </div>

            <button id="send">Wyślij</button>

            <p class="status"><span id="spinner" class="spinner hidden"></span><span id="i-status-text"></span><span id="time-status-text"></span></p>

            <div class="field type-one">
                <label for="result">Wynik</label>
                <textarea id="result" rows="6" readonly placeholder="Tu pojawi się wynik…"></textarea>
            </div>

            <div class="field hidden">
                <label for="resultFile">Wyniki</label>
                <a href="" downlad="" id="resultFile">Pobierz wyniki</a>
            </div>
        </div>

        <button id="toggleGenerate" class="generate-toggle">Generowanie</button>
    </div>

    <div id="sidePanel" class="container side-panel hidden">
        <h2>Generowanie</h2>

        <div class="field type-file hidden">
            <label for="numSyll">Liczba</label>
            <input type="number" id="numSyll" value="5" />
        </div>

        <div class="field">
            <label for="minPremise">Minimum przesłanek</label>
            <input type="number" id="minPremise" value="2" />
        </div>

        <div class="field">
            <label for="maxPremise">Maksimum przesłanek</label>
            <input type="number" id="maxPremise" value="2" />
        </div>
        
        <button id="generateBtn">Generuj</button>

        <p class="status"><span id="genSpinner" class="spinner hidden"></span><span id="gen-i-status-text"></span><span id="gen-time-status-text"></span></p>
    </div>

    <div id="confusionPanel" class="container confusion-panel hidden">
        <h2>Macierz pomyłek</h2>
        <button id="closeConfusion" class="panel-close">×</button>
        <div id="confusionContent">Brak danych.</div>
        <div id="confusionMetrics" class="confusion-metrics">Brak metryk.</div>
    </div>

    <input type="file" id="uploadDialog" accept=".csv" style="display:none;" />

    <script src="scripts/main.js"></script>
</body>
</html>
